plugins {
	id 'fabric-loom' version '1.9-SNAPSHOT'
	id 'maven-publish'
}

sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21

archivesBaseName = project.archives_base_name
version = project.mod_version
group = project.maven_group


loom {
	accessWidenerPath = file("src/main/resources/quickshulker.accesswidener")
}

repositories {
	maven { url 'https://maven.fabricmc.net' }
	maven { url 'https://cursemaven.com' }
	maven { url "https://maven.shedaniel.me/" }
	maven { url 'https://maven.fallenbreath.me/releases' }
	maven { url 'https://jitpack.io' }
//	maven { url 'https://maven.kyrptonaught.dev' }
	maven { url 'https://raw.githubusercontent.com/Aton-Kish/mcmod/maven' }
	maven {
		name = "Terraformers"
		url = "https://maven.terraformersmc.com/"
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	
//	modImplementation include("net.kyrptonaught:kyrptconfig:1.6.1-1.21.4") { exclude group: "net.fabricmc.fabric-api" }

	modImplementation("com.terraformersmc:modmenu:13.0.0") { exclude group: "net.fabricmc.fabric-api" }

	modImplementation ("curse.maven:reinforced-shulker-boxes-529874:6125897") { exclude group: "net.fabricmc.fabric-api" }
	modImplementation "atonkish.reinfcore:reinforced-core:4.0.4+1.21.4"

//	testImplementation 'junit:junit:4.13.1';
	modImplementation include("me.fallenbreath:conditional-mixin-fabric:0.6.4")
	compileOnly group: "com.google.code.findbugs", name: "jsr305", version: "3.0.2";
}

processResources {
	inputs.property "version", project.mod_version

	filesMatching("fabric.mod.json") {
		expand (
				"version": project.mod_version
		)
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	withSourcesJar()
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.archivesBaseName}" }
	}
}

// configure the maven publication
publishing {
	publications {
		mavenJava(MavenPublication) {
			artifactId archivesBaseName
			from components.java
		}
	}
	repositories {
		maven {
			url ='s3://maven.kyrptonaught.dev'
			credentials(AwsCredentials) {
				accessKey = System.getenv('maven-key-id')
				secretKey = System.getenv('maven-key')
			}
		}
	}
}