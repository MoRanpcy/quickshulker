license="${mod_license}"

issueTrackerURL="https://github.com/MoRanpcy/quickshulker/issues"

[[mods]]

modId="${mod_id}"

version="${mod_version}"

displayName="${mod_name}"

displayURL="https://github.com/MoRanpcy/quickshulker"

logoFile= "assets/quickshulker/icon.png"

authors="${mod_authors}"

description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="kyrptconfig.mixins.json"

[[mixins]]
config="shulkerutils.mixins.json"

[[mixins]]
config="quickshulker-compat.mixins.json"

[[accessTransformers]]
file="META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"